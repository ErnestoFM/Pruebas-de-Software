<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Crear Evento</title>
</head>
<body>
    <h1>Crear Nuevo Evento</h1>
    <form th:action="@{/events/create}" th:object="${event}" method="post">
        <div>
            <label for="nombre">Nombre del Evento:</label>
            <input type="text" id="nombre" name="nombre" th:field="*{nombre}" required>
            <p th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></p>
        </div>
        <div>
            <label for="duracion">Duración (minutos):</label>
            <input type="number" id="duracion" name="duracion" th:field="*{duracion}" required>
            <p th:if="${#fields.hasErrors('duracion')}" th:errors="*{duracion}"></p>
        </div>
        <div>
            <label for="fechaPublicacion">Fecha de Publicación:</label>
            <input type="date" id="fechaPublicacion" name="fechaPublicacion" th:field="*{fechaPublicacion}" required>
            <p th:if="${#fields.hasErrors('fechaPublicacion')}" th:errors="*{fechaPublicacion}"></p>
        </div>
        <div>
            <label for="fechaEstreno">Fecha de Estreno:</label>
            <input type="date" id="fechaEstreno" name="fechaEstreno" th:field="*{fechaEstreno}" required>
            <p th:if="${#fields.hasErrors('fechaEstreno')}" th:errors="*{fechaEstreno}"></p>
        </div>
        <div>
            <label for="tipo">Tipo de Evento:</label>
            <select id="tipo" name="tipo" th:field="*{tipo}" required>
                <option value="" disabled selected>Seleccione...</option>
                <option th:each="tipo : ${T(com.ticketmaster.demo.model.Events.TipoEvento).values()}"
                        th:value="${tipo}" th:text="${tipo}"></option>
            </select>
            <p th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}"></p>
        </div>
        <div>
            <label for="stock">Stock:</label>
            <input type="number" id="stock" name="stock" th:field="*{stock}" required>
            <p th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></p>
        </div>
        <div>
            <label for="maxBoletosPorUsuario">Máx. Boletos por Usuario:</label>
            <input type="number" id="maxBoletosPorUsuario" name="maxBoletosPorUsuario" th:field="*{maxBoletosPorUsuario}" required>
            <p th:if="${#fields.hasErrors('maxBoletosPorUsuario')}" th:errors="*{maxBoletosPorUsuario}"></p>
        </div>
        <div>
            <label for="abiertoEnFestivos">Abierto en Festivos:</label>
            <input type="checkbox" id="abiertoEnFestivos" name="abiertoEnFestivos" th:field="*{abiertoEnFestivos}">
        </div>
        <div>
            <label for="diasDisponibles">Días Disponibles:</label>
            <select id="diasDisponibles" name="diasDisponibles" th:field="*{diasDisponibles}" multiple>
                <option th:each="dia : ${T(com.ticketmaster.demo.model.Events.DiasDisponibles).values()}"
                        th:value="${dia}" th:text="${dia}"></option>
            </select>
        </div>
        <div>
            <label for="ropaPermitida">Ropa Permitida:</label>
            <select id="ropaPermitida" name="ropaPermitida" th:field="*{ropaPermitida}" multiple>
                <option th:each="ropa : ${T(com.ticketmaster.demo.model.Events.RopaPermitida).values()}"
                        th:value="${ropa}" th:text="${ropa}"></option>
            </select>
        </div>
        <button type="submit">Crear Evento</button>
    </form>
</body>
</html>
